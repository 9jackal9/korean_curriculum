<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB 국어과 수업 설계 도우미 (AI 엔진 탑재)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .excerpt-box { background-color: #f8fafc; border-left: 4px solid #475569; padding: 15px; margin-bottom: 20px; border-radius: 4px; white-space: pre-wrap; font-family: 'KoPub Batang', 'Batang', serif; line-height: 1.8; }
  </style>
</head>
<body class="text-slate-800 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    /* {% raw %} */
    const { useState, useRef, useEffect } = React;

    // ==========================================
    // 1. 공통 유틸리티 (Word 다운로드)
    // ==========================================
    function exportToWord(elementId, filename, docTitle = "문서") {
      const content = document.getElementById(elementId)?.innerHTML;
      if (!content) return;

      const header = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>${docTitle}</title>
          <style>
            body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 11pt; line-height: 1.6; color: #000; }
            table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
            td, th { border: 1px solid #333; padding: 12px; }
            ul, ol { margin-top: 5px; margin-bottom: 5px; padding-left: 20px; }
            h1 { font-size: 1.8em; margin-bottom: 15px; }
            h2 { font-size: 1.3em; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; }
            h3 { font-size: 1.1em; margin-bottom: 8px; }
            .excerpt-box { background-color: #f1f5f9; border-left: 4px solid #475569; padding: 15px; margin-bottom: 20px; font-family: 'Batang', serif; }
          </style>
        </head>
        <body>
      `;
      const footer = "</body></html>";
      const sourceHTML = header + content + footer;
      
      const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
      const fileDownload = document.createElement("a");
      document.body.appendChild(fileDownload);
      fileDownload.href = source;
      fileDownload.download = filename;
      fileDownload.click();
      document.body.removeChild(fileDownload);
    }

    // ==========================================
    // 2. Gemini AI 연동 엔진 (진짜 AI 생성기 - 핵심 수정 완료)
    // ==========================================
    async function generateWithGeminiAPI(topic, grade, sessions, customApiKey) {
      if (!customApiKey) {
        throw new Error("NO_API_KEY");
      }

      const prompt = `
당신은 대한민국 최고의 중학교 국어 교사이자 IB MYP 전문가입니다.
다음 수업 주제를 바탕으로 완벽하게 창의적이고 심도 있는 '교수학습과정안, 학습지, 형성평가, 서논술형 평가'를 생성하세요.

수업 주제: ${topic}
대상 학년: ${grade}
수업 시수: ${sessions}차시

[중요 지시사항]
1. 당신이 이전에 알고 있던 모든 획일적인 템플릿과 예시를 잊어버리세요. 오직 위 '수업 주제'만을 집중적으로 분석하여, 그 주제에 완벽하게 들어맞는 새롭고 창의적인 수업 설계안을 창작해야 합니다.
2. worksheet, assessment, essay의 'excerpt' 필드에는 반드시 주제와 직접적으로 연관된 '정확하고 올바른 실제 교과서 수준의 예문'을 제시하세요.
   - 문학 작품일 경우: 주제에 맞는 실제 작가와 작품명을 명시하고 원문을 정확히 인용하세요.
   - 비문학/문법/매체일 경우: 논리적 오류가 없고 사실에 기반한 정교하고 구체적인 지문(기사문, 대화문, 연설문 등)을 직접 창작하여 작성하세요.
   - 단순한 상황 설명이나 요약은 절대 금지합니다. 반드시 학생들이 읽고 분석할 수 있는 '읽기 자료(지문)' 형태여야 하며, 분량은 200~400자 정도로 풍부하게 작성하세요.
3. 학습 활동(activities)과 평가 문항(questions, prompt)은 위에서 생성한 'excerpt(제시문)'을 읽고 해결하는 방식으로 긴밀하게 연계되어야 합니다.
4. 반드시 아래 JSON 형식만을 엄격하게 준수하여 출력하세요. (마크다운 백틱(\`\`\`) 없이 순수 JSON 객체만 출력하세요. JSON 형식이 깨지면 프로그램이 멈춥니다.)

{
  "mypYear": ${grade === '중학교 1학년' ? 2 : grade === '중학교 2학년' ? 3 : 4},
  "unitTitle": "주제에 맞는 매력적이고 구체적인 단원명",
  "keyConcept": "주제와 연관된 IB 핵심 개념 1개",
  "relatedConcepts": ["관련 개념1", "관련 개념2"],
  "globalContext": "가장 적절한 글로벌 맥락 1개",
  "statementOfInquiry": "탐구 진술 (핵심 개념, 관련 개념, 글로벌 맥락을 모두 포함한 한 문장)",
  "inquiryQuestions": { "factual": "사실적 질문", "conceptual": "개념적 질문", "debatable": "논쟁적 질문" },
  "koreanCurriculum": ["주제에 맞는 2022 개정 국어과 성취기준 (예: [9국01-01] ~한다.)"],
  "learningProcess": ["도입 활동 내용", "전개 활동 1 내용", "전개 활동 2 내용", "정리 활동 내용"],
  "flowchart": {
    "strategies": "주제에 맞는 핵심 교수학습 전략 (예: 하브루타, 직소 등)",
    "emphasis": "이 수업에서 가장 강조해야 할 교사의 지도 방향",
    "flow": ["1차시: 도입 내용", "2차시: 전개 내용", "3차시: 심화 내용", "4차시: 평가 내용", "5차시: 정리 및 성찰"],
    "assessmentPlan": "구체적인 평가 방안",
    "expectedEffects": ["학생의 성장 기대효과 1", "기대효과 2", "기대효과 3"]
  },
  "worksheet": {
    "excerpt": "학습 활동에 직접 활용할 풍부한 제시문 (문학 원문, 기사, 대화 등 200자 이상)",
    "activities": [
      { "title": "탐구 활동 1 제목", "desc": "위 제시문과 관련된 구체적인 학생 활동 지시문", "space": "150px" },
      { "title": "탐구 활동 2 제목", "desc": "위 제시문과 관련된 구체적인 학생 활동 지시문", "space": "200px" }
    ]
  },
  "assessment": {
    "excerpt": "형성평가 문제 풀이를 위해 제공되는 구체적인 상황 지문이나 텍스트 자료",
    "questions": [
      { "q": "제시문 기반 주관식 문항 1", "a": "모범 답안 및 상세한 해설" },
      { "q": "제시문 기반 주관식 문항 2", "a": "모범 답안 및 상세한 해설" }
    ]
  },
  "essay": {
    "excerpt": "서논술형 평가의 바탕이 되는 핵심 제시문 (구체적 자료, 통계, 혹은 문학 작품 일부)",
    "prompt": "제시문을 바탕으로 학생의 생각이나 주장을 이끌어내는 구체적인 논술 문항",
    "conditions": ["작성 조건 1", "작성 조건 2", "작성 조건 3"],
    "rubric": [
      {
        "criterion": "준거 C: 생산하기",
        "levels": [
          { "score": "7-8", "desc": "탁월 수준 채점 기준 (문항에 맞게 구체적으로)" },
          { "score": "5-6", "desc": "우수 수준 채점 기준" },
          { "score": "1-4", "desc": "미흡 수준 채점 기준" }
        ]
      },
      {
        "criterion": "준거 D: 언어 사용하기",
        "levels": [
          { "score": "7-8", "desc": "탁월 수준 채점 기준 (문항에 맞게 구체적으로)" },
          { "score": "5-6", "desc": "우수 수준 채점 기준" },
          { "score": "1-4", "desc": "미흡 수준 채점 기준" }
        ]
      }
    ]
  }
}`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${customApiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
      };

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorData = await response.json();
        console.error("Gemini API Error:", errorData);
        throw new Error(errorData.error?.message || "API_ERROR");
      }

      const data = await response.json();
      const resultText = data.candidates[0].content.parts[0].text;
      
      try {
        return JSON.parse(resultText);
      } catch (parseError) {
        console.error("Failed to parse JSON response:", resultText);
        throw new Error("JSON_PARSE_ERROR");
      }
    }

    // ==========================================
    // 3. UI 컴포넌트
    // ==========================================
    const Toast = ({ message, onClose, type = "info" }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 5000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const isError = type === "error";

      return (
        <div className="fixed top-4 right-4 z-50 transition-all duration-300 transform translate-y-0 opacity-100 max-w-md">
          <div className={`${isError ? 'bg-red-800' : 'bg-slate-800'} text-white p-4 rounded-xl shadow-2xl flex items-start space-x-3 border ${isError ? 'border-red-700' : 'border-slate-700'}`}>
            <i className={`fas ${isError ? 'fa-exclamation-triangle text-red-400' : 'fa-info-circle text-blue-400'} mt-1`}></i>
            <p className="text-sm font-medium leading-relaxed">{message}</p>
          </div>
        </div>
      );
    };

    const ErrorAlert = ({ message }) => {
      if (!message) return null;
      return (
        <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-4 rounded-xl flex items-start space-x-3 shadow-sm mb-6">
          <i className="fas fa-exclamation-circle text-red-500 mt-1"></i>
          <span className="text-sm font-medium leading-relaxed">{message}</span>
        </div>
      );
    };

    const NavButton = ({ active, onClick, icon, label }) => (
      <button
        onClick={onClick}
        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-2xl transition-all duration-200 group relative overflow-hidden ${
          active ? 'bg-blue-600 text-white font-bold shadow-lg shadow-blue-900/50' : 'text-slate-400 hover:bg-slate-800 hover:text-white font-medium'
        }`}
      >
        {active && <span className="absolute left-0 top-0 bottom-0 w-1.5 bg-cyan-400 rounded-r-full"></span>}
        <div className={`transition-transform duration-200 ${active ? 'scale-110' : 'group-hover:scale-110'}`}>{icon}</div>
        <span className="text-sm tracking-tight">{label}</span>
      </button>
    );

    const ActionButton = ({ color, label, icon, onClick, disabled }) => {
      const bgColors = {
        blue: 'bg-blue-600 hover:bg-blue-700 shadow-blue-200',
        teal: 'bg-teal-600 hover:bg-teal-700 shadow-teal-200',
        orange: 'bg-orange-500 hover:bg-orange-600 shadow-orange-200',
        rose: 'bg-rose-500 hover:bg-rose-600 shadow-rose-200',
        cyan: 'bg-cyan-600 hover:bg-cyan-700 shadow-cyan-200'
      };
      
      return (
        <button 
          onClick={onClick} 
          disabled={disabled}
          className={`${disabled ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : bgColors[color] + ' text-white shadow-lg active:scale-95'} font-bold py-4 px-2 rounded-2xl flex flex-col justify-center items-center space-y-2 transition-all group`}
        >
          <div className={disabled ? '' : 'group-hover:-translate-y-1 transition-transform'}>{icon}</div>
          <span className="text-[13px]">{label}</span>
        </button>
      );
    };

    // ==========================================
    // 4. 서브 화면 (Views)
    // ==========================================
    const PlannerView = () => {
      const [step, setStep] = useState(1);
      const [formData, setFormData] = useState({ grade: '중학교 1학년', scope: '단원 지도안', sessions: 10, topic: '', apiKey: '' });
      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedPlan, setGeneratedPlan] = useState(null);
      const [resultTab, setResultTab] = useState('plan'); 
      const [assessmentMode, setAssessmentMode] = useState('student');
      const [essayMode, setEssayMode] = useState('student'); 
      const [error, setError] = useState('');
      const [toast, setToast] = useState(null);

      // AI 생성 핵심 로직
      const handleGenerate = async (targetTab) => {
        if (!formData.topic.trim()) {
          setError("수업 주제나 핵심 키워드를 입력해주세요.");
          return;
        }
        
        if (!formData.apiKey.trim()) {
          setError("실제 맞춤형 데이터를 생성하기 위해 Gemini API Key를 반드시 입력해주세요. (보안상 저장되지 않습니다)");
          return;
        }

        setError('');
        setIsGenerating(true);
        setStep(3); // 로딩 화면으로 전환
        
        try {
          // Gemini API 통신
          const plan = await generateWithGeminiAPI(formData.topic, formData.grade, formData.sessions, formData.apiKey);
          
          // 정상적으로 데이터를 받아왔을 때만 상태 업데이트
          setGeneratedPlan(plan);
          setResultTab(targetTab);
          setIsGenerating(false);
          setToast({ type: 'info', message: "✨ Gemini AI가 입력하신 주제에 맞춰 실제 지문과 창의적 학습 활동을 완벽하게 창작했습니다!" });
          
        } catch (err) {
          // 에러 발생 시 처리 (이전처럼 조용히 넘어가지 않음)
          console.error("Generation Failed:", err);
          setIsGenerating(false);
          setStep(1); // 다시 입력 화면으로 돌려보냄
          
          if (err.message === "NO_API_KEY") {
            setError("API Key가 입력되지 않았습니다.");
          } else if (err.message === "JSON_PARSE_ERROR") {
            setError("AI가 응답을 생성했지만 형식이 올바르지 않습니다. 다시 한 번 생성 버튼을 눌러주세요.");
          } else {
            setError(`AI 통신 중 오류가 발생했습니다. API Key가 올바른지 확인해주세요. (상세 오류: ${err.message})`);
          }
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <p className="text-slate-500 text-lg mb-6 leading-relaxed">
            API Key와 수업 주제를 입력하시면, <strong>AI가 실제 교과서 수준의 지문(예문)을 직접 창작하고 그에 완벽히 연계된 맞춤형 학습 활동</strong>을 실시간으로 설계해 드립니다.
          </p>

          {error && <ErrorAlert message={error} />}

          {step < 3 && (
            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-8">
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">대상 학년</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.grade} onChange={(e) => setFormData({...formData, grade: e.target.value})}><option>중학교 1학년</option><option>중학교 2학년</option><option>중학교 3학년</option></select>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">설계 범위</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.scope} onChange={(e) => setFormData({...formData, scope: e.target.value})}><option>단원 지도안</option><option>차시별 지도안</option></select>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">수업 시수</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.sessions} onChange={(e) => setFormData({...formData, sessions: parseInt(e.target.value)})}>
                    {[...Array(10)].map((_, i) => <option key={i + 1} value={i + 1}>{i + 1}차시</option>)}
                  </select>
                </div>
              </div>

              <hr className="border-slate-100" />

              <div className="space-y-4">
                <label className="block text-sm font-bold text-slate-700">수업 주제 상세 입력 (가장 중요)</label>
                <textarea 
                  rows="3" 
                  className="w-full p-4 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none resize-none font-medium leading-relaxed"
                  placeholder="단원명이나 구체적인 학습 목표를 상세히 입력하세요.&#10;예) 김동인의 '적벽애'를 통한 비유와 상징의 이해&#10;예) 청소년 언어 파괴 현상과 올바른 매체 언어 사용 토론"
                  value={formData.topic} 
                  onChange={(e) => setFormData({...formData, topic: e.target.value})}
                />
              </div>

              {/* 필수 API Key 입력란 (강조) */}
              <div className="p-5 bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-200 rounded-2xl flex items-start space-x-4">
                <i className="fas fa-key text-blue-600 text-2xl mt-1"></i>
                <div className="flex-1">
                  <p className="text-sm font-bold text-blue-900 mb-2">Gemini API Key 입력 (필수)</p>

                                  <td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', fontWeight: 'bold', textAlign: 'center' } }>기대 효과</td>
                                  <td style={ { border: '1px solid #000', padding: '15px' } }>
                                    <ul style={ { margin: 0, paddingLeft: '20px' } }>{generatedPlan.flowchart.expectedEffects.map((effect, idx) => <li key={idx} style={ { marginBottom: '5px' } }>{effect}</li>)}</ul>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    )}

                  </div>
                )
              )}
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('planner');

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
          <aside className="w-72 bg-slate-900 flex flex-col z-20 shadow-xl">
            <div className="p-6 flex items-center space-x-3 border-b border-slate-800">
              <div className="bg-blue-600 p-2 rounded-xl text-white text-xl"><i className="fas fa-book-open"></i></div>
              <h1 className="text-[1.1rem] font-bold text-white tracking-tight leading-tight">IB & 2022<br/>국어 수업 설계</h1>
            </div>
            <nav className="p-4 space-y-2 flex-1">
              <NavButton active={activeTab === 'planner'} onClick={() => setActiveTab('planner')} icon={<i className="fas fa-file-alt text-lg"></i>} label="교수학습과정안 설계" />
              <NavButton active={activeTab === 'record'} onClick={() => setActiveTab('record')} icon={<i className="fas fa-star text-lg"></i>} label="교과 세특 자동 생성" />
              <NavButton active={activeTab === 'methods'} onClick={() => setActiveTab('methods')} icon={<i className="fas fa-lightbulb text-lg"></i>} label="국어과 맞춤 수업 방법" />
            </nav>
          </aside>

          <main className="flex-1 flex flex-col h-screen relative overflow-hidden bg-slate-50">
            <header className="h-16 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center px-8 justify-between shadow-sm z-10 absolute top-0 w-full">
              <h2 className="text-lg font-bold text-slate-800">
                {activeTab === 'planner' && 'AI 맞춤형 수업 자료 설계'}
                {activeTab === 'record' && 'AI 교과 세특 생성'}
                {activeTab === 'methods' && '국어과 맞춤형 수업 방법'}
              </h2>
            </header>
            <div className="flex-1 overflow-y-auto p-8 pt-24 pb-20">
              <div className="max-w-5xl mx-auto">
                {activeTab === 'planner' && <PlannerView />}
                {activeTab === 'record' && <RecordView />}
                {activeTab === 'methods' && <MethodsView />}
              </div>
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    /* {% endraw %} */
  </script>
</body>
</html>
