<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB 국어과 수업 설계 도우미 (AI 엔진 탑재)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .excerpt-box { background-color: #f8fafc; border-left: 4px solid #475569; padding: 15px; margin-bottom: 20px; border-radius: 4px; white-space: pre-wrap; font-family: 'KoPub Batang', 'Batang', serif; line-height: 1.8; }
  </style>
</head>
<body class="text-slate-800 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    /* {% raw %} */
    const { useState, useRef, useEffect } = React;

    // ==========================================
    // 1. 공통 유틸리티 (Word 다운로드)
    // ==========================================
    function exportToWord(elementId, filename, docTitle = "문서") {
      const content = document.getElementById(elementId)?.innerHTML;
      if (!content) return;

      const header = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>${docTitle}</title>
          <style>
            body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 11pt; line-height: 1.6; color: #000; }
            table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
            td, th { border: 1px solid #333; padding: 12px; }
            ul, ol { margin-top: 5px; margin-bottom: 5px; padding-left: 20px; }
            h1 { font-size: 1.8em; margin-bottom: 15px; }
            h2 { font-size: 1.3em; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; }
            h3 { font-size: 1.1em; margin-bottom: 8px; }
            .excerpt-box { background-color: #f1f5f9; border-left: 4px solid #475569; padding: 15px; margin-bottom: 20px; font-family: 'Batang', serif; }
          </style>
        </head>
        <body>
      `;
      const footer = "</body></html>";
      const sourceHTML = header + content + footer;
      
      const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
      const fileDownload = document.createElement("a");
      document.body.appendChild(fileDownload);
      fileDownload.href = source;
      fileDownload.download = filename;
      fileDownload.click();
      document.body.removeChild(fileDownload);
    }

    // ==========================================
    // 2. Gemini AI 연동 엔진 (진짜 AI 생성기)
    // ==========================================
    async function generateWithGeminiAPI(topic, grade, sessions, customApiKey) {
      // 캔버스 환경에서는 환경 변수를 통해, 깃허브 환경에서는 유저가 직접 입력한 키를 사용합니다.
      const environmentKey = ""; // 시스템 주입 키
      const keyToUse = environmentKey || customApiKey;

      if (!keyToUse) {
        throw new Error("NO_API_KEY");
      }

      const prompt = `
당신은 대한민국 최고의 중학교 국어 교사이자 IB MYP 전문가입니다.
다음 수업 주제를 바탕으로 완벽하게 창의적이고 심도 있는 '교수학습과정안, 학습지, 형성평가, 서논술형 평가'를 생성하세요.

수업 주제: ${topic}
대상 학년: ${grade}
수업 시수: ${sessions}차시

[중요 지시사항]
1. 획일적인 템플릿을 벗어나, 주제에 딱 맞는 완전히 새로운 문항과 활동을 창작하세요.
2. worksheet, assessment, essay의 'excerpt' 필드에는 반드시 주제와 관련된 '실제 교과서 수준의 예문(소설의 일부, 시 1편, 기사문, 메신저 대화문 등)'을 구체적이고 길게(200자 이상) 창작하거나 인용하여 작성하세요. 단순 설명이 아닌 '지문'이어야 합니다.
3. 반드시 아래 JSON 형식만을 엄격하게 준수하여 출력하세요. (마크다운 백틱 없이 순수 JSON만 출력)

{
  "mypYear": ${grade === '중학교 1학년' ? 2 : grade === '중학교 2학년' ? 3 : 4},
  "unitTitle": "주제에 맞는 매력적인 단원명",
  "keyConcept": "주요 개념",
  "relatedConcepts": ["관련 개념1", "관련 개념2"],
  "globalContext": "글로벌 맥락",
  "statementOfInquiry": "탐구 진술",
  "inquiryQuestions": { "factual": "사실적 질문", "conceptual": "개념적 질문", "debatable": "논쟁적 질문" },
  "koreanCurriculum": ["관련 2022 개정 국어과 성취기준 1개 이상"],
  "learningProcess": ["도입 활동", "전개 활동 1", "전개 활동 2", "정리 활동"],
  "flowchart": {
    "strategies": "주제에 맞는 핵심 교수학습 전략",
    "emphasis": "수업 강조점",
    "flow": ["1단계 흐름", "2단계 흐름", "3단계 흐름", "4단계 흐름", "5단계 흐름"],
    "assessmentPlan": "평가 방안",
    "expectedEffects": ["기대효과 1", "기대효과 2", "기대효과 3"]
  },
  "worksheet": {
    "excerpt": "주제와 관련된 생생한 읽기 자료, 시, 소설 본문, 또는 기사 예문 (가장 중요!)",
    "activities": [
      { "title": "창의적 활동 1", "desc": "지문과 연계된 구체적 활동 지시문", "space": "150px" },
      { "title": "창의적 활동 2", "desc": "지문과 연계된 구체적 활동 지시문", "space": "200px" }
    ]
  },
  "assessment": {
    "excerpt": "형성평가 풀이를 위한 짧은 상황 지문 또는 예문",
    "questions": [
      { "q": "주관식 문제 1", "a": "모범 답안 및 해설 1" },
      { "q": "주관식 문제 2", "a": "모범 답안 및 해설 2" }
    ]
  },
  "essay": {
    "excerpt": "서논술형 평가를 위한 핵심 제시문 또는 논제 배경 설명",
    "prompt": "논술 문항 (구체적인 조건과 상황 부여)",
    "conditions": ["조건 1", "조건 2", "조건 3"],
    "rubric": [
      {
        "criterion": "준거 C: 생산하기",
        "levels": [
          { "score": "7-8", "desc": "탁월 수준 채점 기준" },
          { "score": "5-6", "desc": "우수 수준 채점 기준" },
          { "score": "1-4", "desc": "미흡 수준 채점 기준" }
        ]
      },
      {
        "criterion": "준거 D: 언어 사용하기",
        "levels": [
          { "score": "7-8", "desc": "탁월 수준 채점 기준" },
          { "score": "5-6", "desc": "우수 수준 채점 기준" },
          { "score": "1-4", "desc": "미흡 수준 채점 기준" }
        ]
      }
    ]
  }
}`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${keyToUse}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error("API_ERROR");
      }

      const data = await response.json();
      const resultText = data.candidates[0].content.parts[0].text;
      return JSON.parse(resultText);
    }

    // ==========================================
    // API 실패 시 작동하는 스마트 로컬 엔진 (Fallback)
    // ==========================================
    function generateSmartLocalPlan(input) {
      const topic = (input.topic || input.imageName || "국어과 핵심 탐구").trim();
      const mypYearMap = { '중학교 1학년': 2, '중학교 2학년': 3, '중학교 3학년': 4 };
      const year = mypYearMap[input.grade] || 2;

      return {
        mypYear: year,
        unitTitle: `[맞춤형] ${topic} - 깊이 있는 탐구와 실제`,
        keyConcept: "관점 (Perspective), 소통 (Communication)",
        relatedConcepts: ["표현 (Expression)", "맥락 (Context)"],
        globalContext: "개인적 표현과 문화적 표현",
        statementOfInquiry: `학생들은 '${topic}'을(를) 주도적으로 탐구함으로써, 관련된 다양한 관점을 이해하고 자신의 생각을 효과적으로 표현할 수 있다.`,
        inquiryQuestions: { 
          factual: `'${topic}'을(를) 구성하는 핵심 요소와 특징은 무엇인가?`, 
          conceptual: `'${topic}'에 담긴 의미와 의도는 우리의 삶과 어떻게 연결되는가?`, 
          debatable: `'${topic}'에 대하여 제기될 수 있는 다양한 해석 중 어떤 관점이 가장 타당한가?` 
        },
        koreanCurriculum: [`[2022 개정 국어] '${topic}'과(와) 관련된 텍스트를 비판적으로 이해하고 창의적으로 표현한다.`],
        learningProcess: [
          `[도입] '${topic}' 관련 실생활 사례 탐색 및 핵심 질문 도출 (동기유발)`, 
          `[전개 1] '${topic}'의 핵심 개념 및 원리 학습 (교사 미니 레슨)`, 
          `[전개 2] 관련 지문 심층 분석 및 모둠별 상호 토의 (비판적 사고)`,
          `[정리] '${topic}'을(를) 적용한 개별 결과물 제작 및 성찰 일지 작성`
        ],
        flowchart: {
          strategies: "개념 기반 탐구 학습, 모둠 협력 토의, 과정 중심 평가",
          emphasis: "교사 주도의 설명에서 벗어나, 학생의 주도적인 탐구를 통한 깊이 있는 이해와 실제적 적용 강조",
          flow: [
            `[도입] '${topic}'에 대한 사전 지식 활성화 및 핵심 질문 제기`,
            `[전개1] 다양한 자료 조사를 통한 '${topic}'의 다각적 분석`,
            `[전개2] 습득한 지식을 바탕으로 모둠별 문제 해결 방안 논의`,
            `[전개3] 개별 결과물(글쓰기/발표) 초고 작성 및 동료 피드백`,
            `[정리] 피드백을 반영한 최종 결과물 학급 공유 및 학습 성찰`
          ],
          assessmentPlan: `형성평가(탐구 활동지 점검 및 관찰 평가), 총괄평가('${topic}' 관련 서논술형 평가 및 루브릭 채점)`,
          expectedEffects: [`'${topic}'에 대한 심층적이고 구조적인 이해력 향상`, "텍스트를 비판적으로 수용하고 창의적으로 생산하는 역량 강화", "협력적 의사소통 및 타인의 관점을 존중하는 태도 배양"]
        },
        worksheet: {
          excerpt: `📖 [탐구 자료: ${topic}]\n\n(이곳에는 '${topic}'과(와) 관련된 문학 작품의 핵심 장면, 비문학 지문, 기사문 등 실제 학습할 텍스트가 제시됩니다. 학생들은 제시된 텍스트를 꼼꼼히 읽고 아래의 활동을 수행합니다.)`,
          activities: [
            { title: "핵심 파악하기", desc: `위 지문에서 '${topic}'의 가장 중요한 특징이나 인상 깊은 구절을 찾아 적고, 그 이유를 분석해 봅시다.`, space: "150px" },
            { title: "나의 관점 세우기", desc: `지문에 나타난 상황이나 주제를 자신의 일상생활 경험과 연결해 보고, '${topic}'에 대한 나의 생각이나 해결 방안을 자유롭게 서술해 봅시다.`, space: "250px" }
          ]
        },
        assessment: {
          excerpt: `💬 [보기 자료]\n(학생들이 '${topic}'의 개념과 원리를 정확히 이해했는지 점검하기 위한 구체적인 대화문이나 짧은 사례가 주어집니다.)`,
          questions: [
            { q: `이번 시간에 배운 '${topic}'의 핵심 특징 두 가지를 서술하시오.`, a: "(학생이 탐구 과정에서 발견한 주요 특징 두 가지를 논리적으로 서술함)" },
            { q: `보기 자료에 나타난 상황을 '${topic}'의 관점에서 분석하고, 올바른 방향으로 수정(또는 평가)하시오.`, a: "(주어진 상황을 비판적으로 분석하여 올바른 대안을 제시함)" }
          ]
        },
        essay: {
          excerpt: `📰 [논제 배경] 현대 사회에서 '${topic}'이(가) 지니는 가치와 논쟁적 상황`,
          prompt: `'${topic}'에 대해 탐구한 내용을 바탕으로, 이 주제가 현대 사회에서 가지는 의미와 중요성에 대하여 자신의 견해를 한 편의 글로 논술하시오.`,
          conditions: [
            "글의 목적과 예상 독자를 고려하여 서론-본론-결론의 구조로 작성할 것",
            "주장을 뒷받침하는 구체적이고 타당한 실생활 사례를 2가지 이상 제시할 것",
            "띄어쓰기 포함 500자 이상 800자 이내로 작성할 것"
          ],
          rubric: [
            {
              criterion: "준거 C: 생산하기 (논리적 구조)",
              levels: [
                { score: "7-8", desc: `주제가 명확히 드러나며, 타당한 근거를 통해 '${topic}'에 대한 깊이 있는 통찰력을 보여줌. 서-본-결 구조가 탁월함.` },
                { score: "5-6", desc: "글의 기본 구조를 갖추고 있으며 적절한 근거를 제시하여 주장을 무난하게 전개함." },
                { score: "1-4", desc: "주장은 있으나 근거가 빈약하거나 글의 구조가 다소 엉성함." }
              ]
            },
            {
              criterion: "준거 D: 언어 사용하기 (표현 및 어법)",
              levels: [
                { score: "7-8", desc: "주제에 적합하고 다양한 어휘를 구사하며, 어법 및 맞춤법 오류가 전혀 없음." },
                { score: "5-6", desc: "일반적이고 평이한 어휘를 사용하며, 사소한 어법 오류가 있으나 의미 전달에 지장이 없음." },
                { score: "1-4", desc: "어휘 선택이 단조롭고 문맥에 맞지 않는 표현과 맞춤법 오류가 빈번함." }
              ]
            }
          ]
        }
      };
    }

    // ==========================================
    // 3. UI 컴포넌트
    // ==========================================
    const Toast = ({ message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 4000);
        return () => clearTimeout(timer);
      }, [onClose]);

      return (
        <div className="fixed top-4 right-4 z-50 transition-all duration-300 transform translate-y-0 opacity-100 max-w-sm">
          <div className="bg-slate-800 text-white p-4 rounded-xl shadow-2xl flex items-start space-x-3 border border-slate-700">
            <i className="fas fa-info-circle text-blue-400 mt-1"></i>
            <p className="text-sm font-medium leading-relaxed">{message}</p>
          </div>
        </div>
      );
    };

    const NavButton = ({ active, onClick, icon, label }) => (
      <button
        onClick={onClick}
        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-2xl transition-all duration-200 group relative overflow-hidden ${
          active ? 'bg-blue-600 text-white font-bold shadow-lg shadow-blue-900/50' : 'text-slate-400 hover:bg-slate-800 hover:text-white font-medium'
        }`}
      >
        {active && <span className="absolute left-0 top-0 bottom-0 w-1.5 bg-cyan-400 rounded-r-full"></span>}
        <div className={`transition-transform duration-200 ${active ? 'scale-110' : 'group-hover:scale-110'}`}>{icon}</div>
        <span className="text-sm tracking-tight">{label}</span>
      </button>
    );

    const ActionButton = ({ color, label, icon, onClick }) => {
      const bgColors = {
        blue: 'bg-blue-600 hover:bg-blue-700 shadow-blue-200',
        teal: 'bg-teal-600 hover:bg-teal-700 shadow-teal-200',
        orange: 'bg-orange-500 hover:bg-orange-600 shadow-orange-200',
        rose: 'bg-rose-500 hover:bg-rose-600 shadow-rose-200',
        cyan: 'bg-cyan-600 hover:bg-cyan-700 shadow-cyan-200'
      };
      return (
        <button onClick={onClick} className={`${bgColors[color]} text-white font-bold py-4 px-2 rounded-2xl flex flex-col justify-center items-center space-y-2 shadow-lg transition-all active:scale-95 group`}>
          <div className="group-hover:-translate-y-1 transition-transform">{icon}</div>
          <span className="text-[13px]">{label}</span>
        </button>
      );
    };

    // ==========================================
    // 4. 서브 화면 (Views)
    // ==========================================
    const RecordView = () => {
      const [studentCount, setStudentCount] = useState(1);
      const [isGenerating, setIsGenerating] = useState(false);
      const [records, setRecords] = useState([]);

      const handleGenerate = () => {
        setIsGenerating(true);
        setTimeout(() => {
          setRecords(generateMockRecords(studentCount));
          setIsGenerating(false);
        }, 1500);
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <p className="text-slate-500 text-lg mb-6">학생들의 평가 결과물을 업로드하면 AI가 분석하여 <strong className="text-slate-800">교과 세특 문구를 자동 생성</strong>합니다.</p>
          
          {!records.length && !isGenerating && (
            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">대상 학생 수</label>
                <div className="flex items-center space-x-3">
                  <div className="relative flex items-center">
                    <i className="fas fa-users text-slate-400 absolute left-3"></i>
                    <input type="number" min="1" max="35" className="pl-10 w-36 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 font-medium outline-none" value={studentCount} onChange={(e) => setStudentCount(e.target.value)} />
                  </div>
                  <span className="text-slate-500 font-medium">명</span>
                </div>
              </div>
              <button onClick={handleGenerate} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform"><i className="fas fa-star text-yellow-400 mr-2"></i>세특 문구 자동 생성 시작</button>
            </div>
          )}

          {isGenerating && (
            <div className="py-32 flex flex-col items-center justify-center space-y-6">
              <i className="fas fa-spinner fa-spin text-blue-600 text-6xl"></i>
              <h3 className="text-xl font-extrabold text-slate-800">AI가 학생 결과물을 분석 중입니다...</h3>
            </div>
          )}

          {records.length > 0 && !isGenerating && (
            <div className="bg-white p-10 rounded-3xl border shadow-sm">
              <div className="flex justify-between mb-6">
                <h2 className="text-xl font-bold">생성된 세특 내역</h2>
                <button onClick={() => setRecords([])} className="text-blue-600 font-bold text-sm"><i className="fas fa-redo mr-1"></i> 다시 만들기</button>
              </div>
              <table className="w-full border-collapse">
                <thead><tr className="bg-slate-100"><th className="border p-3 w-16">번호</th><th className="border p-3">내용</th></tr></thead>
                <tbody>{records.map((r, i) => (<tr key={i}><td className="border p-3 text-center font-bold">{r.id}</td><td className="border p-4 leading-relaxed">{r.content}</td></tr>))}</tbody>
              </table>
            </div>
          )}
        </div>
      );
    };

    const PlannerView = () => {
      const [step, setStep] = useState(1);
      const [inputType, setInputType] = useState('text');
      const [formData, setFormData] = useState({ grade: '중학교 1학년', scope: '단원 지도안', sessions: 10, topic: '', apiKey: '' });
      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedPlan, setGeneratedPlan] = useState(null);
      const [resultTab, setResultTab] = useState('plan'); 
      const [assessmentMode, setAssessmentMode] = useState('student');
      const [essayMode, setEssayMode] = useState('student'); 
      const [toast, setToast] = useState('');

      const handleGenerate = async (targetTab) => {
        if (inputType === 'text' && !formData.topic.trim()) {
          setToast("수업 주제나 핵심 키워드를 입력해주세요. (예: 소설 동백꽃, 가짜 뉴스 판별)");
          return;
        }
        
        setIsGenerating(true);
        setStep(3);
        
        try {
          // 1. 진짜 AI(Gemini API) 호출 시도
          const plan = await generateWithGeminiAPI(formData.topic, formData.grade, formData.sessions, formData.apiKey);
          setGeneratedPlan(plan);
          setResultTab(targetTab);
          setIsGenerating(false);
          setToast("✨ Gemini AI가 실제 지문과 창의적 학습 활동을 생성했습니다!");
        } catch (error) {
          // 2. 실패 시(키 없음 또는 네트워크 오류) 동적 로컬 엔진으로 Fallback
          console.warn("AI Generation Failed, using Local Smart Fallback:", error);
          setTimeout(() => {
            setGeneratedPlan(generateSmartLocalPlan(formData));
            setResultTab(targetTab);
            setIsGenerating(false);
            setToast("⚠️ API 키가 없거나 응답이 지연되어 '기본 맞춤형 모드'로 생성되었습니다. 완벽한 지문 생성을 원하시면 설정에서 Gemini API 키를 입력해주세요.");
          }, 1500);
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}

          <p className="text-slate-500 text-lg mb-6 leading-relaxed">
            수업 주제를 입력하시면 <strong>실제 교과서 지문(예문)과 창의적인 학습 활동이 완벽하게 반영된 맞춤형 자료</strong>를 AI가 즉시 설계해 드립니다.
          </p>

          {step < 3 && (
            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-8">
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">대상 학년</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.grade} onChange={(e) => setFormData({...formData, grade: e.target.value})}><option>중학교 1학년</option><option>중학교 2학년</option><option>중학교 3학년</option></select>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">설계 범위</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.scope} onChange={(e) => setFormData({...formData, scope: e.target.value})}><option>단원 지도안</option><option>차시별 지도안</option></select>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-bold text-slate-700">수업 시수</label>
                  <select className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-blue-500" value={formData.sessions} onChange={(e) => setFormData({...formData, sessions: parseInt(e.target.value)})}>
                    {[...Array(10)].map((_, i) => <option key={i + 1} value={i + 1}>{i + 1}차시</option>)}
                  </select>
                </div>
              </div>

              <hr className="border-slate-100" />

              <div className="space-y-4">
                <label className="block text-sm font-bold text-slate-700">수업 주제 상세 입력 (가장 중요)</label>
                <textarea 
                  rows="4" 
                  className="w-full p-4 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none resize-none"
                  placeholder="단원명이나 구체적인 학습 목표를 입력하세요.&#10;예) 소설 '동백꽃'의 갈등 분석과 인물 심리 파악&#10;예) 윤동주 '새로운 길' 비유법 분석하기&#10;예) 가짜 뉴스 판별과 매체 리터러시"
                  value={formData.topic} 
                  onChange={(e) => setFormData({...formData, topic: e.target.value})}
                />
              </div>

              {/* GitHub 배포용 API Key 입력란 */}
              <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl flex items-center space-x-4">
                <i className="fas fa-magic text-blue-500 text-xl"></i>
                <div className="flex-1">
                  <p className="text-sm font-bold text-blue-900 mb-1">고급 AI 모드 사용 (GitHub Pages 배포 시 필수)</p>
                  <input 
                    type="password" 
                    placeholder="Gemini API Key를 입력하면 생생한 실제 예문이 생성됩니다. (선택 사항)" 
                    className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none focus:border-blue-500"
                    value={formData.apiKey}
                    onChange={(e) => setFormData({...formData, apiKey: e.target.value})}
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 pt-4">
                <ActionButton color="blue" label="과정안 생성" icon={<i className="fas fa-table text-lg"></i>} onClick={() => handleGenerate('plan')} />
                <ActionButton color="teal" label="학습지 생성" icon={<i className="fas fa-edit text-lg"></i>} onClick={() => handleGenerate('worksheet')} />
                <ActionButton color="orange" label="형성평가 생성" icon={<i className="fas fa-check-square text-lg"></i>} onClick={() => handleGenerate('assessment')} />
                <ActionButton color="rose" label="서논술형 생성" icon={<i className="fas fa-file-alt text-lg"></i>} onClick={() => handleGenerate('essay')} />
                <ActionButton color="cyan" label="수업 흐름도" icon={<i className="fas fa-desktop text-lg"></i>} onClick={() => handleGenerate('flowchart')} />
              </div>
            </div>
          )}

          {step === 3 && (
            <div className="animate-in fade-in duration-500">
              {isGenerating ? (
                 <div className="flex flex-col items-center justify-center py-32 space-y-6">
                   <i className="fas fa-spinner fa-spin text-blue-600 text-6xl"></i>
                   <div className="text-center">
                     <h3 className="text-xl font-extrabold text-slate-800 mb-2">AI가 교과서와 지문을 분석하여 창작 중입니다...</h3>
                     <p className="text-slate-500 text-sm">입력하신 주제에 꼭 맞는 완벽한 수업 설계안을 기대해 주세요!</p>
                   </div>
                 </div>
              ) : (
                <div className="space-y-6 animate-in fade-in">
                  
                  <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-2 rounded-2xl shadow-sm border">
                    <button onClick={() => setStep(1)} className="text-slate-500 font-bold text-sm px-4"><i className="fas fa-chevron-left mr-2"></i> 처음으로</button>
                    <div className="flex p-1 bg-slate-100 rounded-xl overflow-x-auto scrollbar-hide w-full md:w-auto">
                      <button onClick={() => setResultTab('plan')} className={`px-4 py-2.5 rounded-lg text-sm font-bold ${resultTab === 'plan' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>과정안</button>
                      <button onClick={() => setResultTab('worksheet')} className={`px-4 py-2.5 rounded-lg text-sm font-bold ${resultTab === 'worksheet' ? 'bg-teal-600 text-white' : 'text-slate-500'}`}>학습지</button>
                      <button onClick={() => setResultTab('assessment')} className={`px-4 py-2.5 rounded-lg text-sm font-bold ${resultTab === 'assessment' ? 'bg-orange-500 text-white' : 'text-slate-500'}`}>형성평가</button>
                      <button onClick={() => setResultTab('essay')} className={`px-4 py-2.5 rounded-lg text-sm font-bold ${resultTab === 'essay' ? 'bg-rose-500 text-white' : 'text-slate-500'}`}>서논술형</button>
                      <button onClick={() => setResultTab('flowchart')} className={`px-4 py-2.5 rounded-lg text-sm font-bold ${resultTab === 'flowchart' ? 'bg-cyan-600 text-white' : 'text-slate-500'}`}>수업 흐름도</button>
                    </div>
                  </div>
                  
                  {/* 결과 화면들 */}
                  {resultTab === 'plan' && (
                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                      <div className="flex justify-end">
                        <button onClick={() => exportToWord("plan-content", "과정안.doc", "과정안")} className="bg-slate-900 text-white font-bold py-2.5 px-5 rounded-xl text-sm"><i className="fas fa-download mr-2"></i>다운로드</button>
                      </div>
                      <div className="bg-white p-10 md:p-14 border rounded-3xl shadow-sm overflow-x-auto">
                        <div id="plan-content" className="font-serif min-w-[700px] text-black">
                          <h1 style={ { textAlign: 'center', fontSize: '1.8em', fontWeight: 'bold', marginBottom: '30px' } }>MYP 교수학습과정안</h1>
                          <table style={ { width: '100%', borderCollapse: 'collapse', marginBottom: '30px', border: '1px solid #000' } }>
                            <tbody>
                              <tr>
                                <td style={ { border: '1px solid #000', padding: '10px', fontWeight: 'bold', backgroundColor: '#f1f5f9', width: '15%', textAlign: 'center' } }>단원명</td>
                                <td style={ { border: '1px solid #000', padding: '10px' } } colSpan="3">{generatedPlan.unitTitle}</td>
                              </tr>
                            </tbody>
                          </table>
                          
                          <h2 style={ { fontSize: '1.2em', fontWeight: 'bold', borderBottom: '2px solid #000', paddingBottom: '5px', marginBottom: '15px' } }>1. 탐구: 목적 설정 (Inquiry)</h2>
                          <table style={ { width: '100%', borderCollapse: 'collapse', marginBottom: '30px', border: '1px solid #000' } }>
                            <tbody>
                              <tr>
                                <td style={ { border: '1px solid #000', padding: '10px', textAlign: 'center' } }><strong>{generatedPlan.keyConcept}</strong></td>
                                <td style={ { border: '1px solid #000', padding: '10px', textAlign: 'center' } }>{generatedPlan.relatedConcepts.join(', ')}</td>
                                <td style={ { border: '1px solid #000', padding: '10px', textAlign: 'center' } }>{generatedPlan.globalContext}</td>
                              </tr>
                              <tr>
                                <td colSpan="3" style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#f8fafc' } }>
                                  <div style={ { fontWeight: 'bold', marginBottom: '5px' } }>탐구 진술</div>
                                  <div style={ { fontStyle: 'italic', color: '#1d4ed8' } }>"{generatedPlan.statementOfInquiry}"</div>
                                </td>
                              </tr>
                              <tr>
                                <td colSpan="3" style={ { border: '1px solid #000', padding: '15px' } }>
                                  <div style={ { fontWeight: 'bold', marginBottom: '8px' } }>탐구 질문</div>
                                  <ul style={ { paddingLeft: '20px', margin: 0 } }>
                                    <li><strong>사실적:</strong> {generatedPlan.inquiryQuestions.factual}</li>
                                    <li><strong>개념적:</strong> {generatedPlan.inquiryQuestions.conceptual}</li>
                                    <li><strong>논쟁적:</strong> {generatedPlan.inquiryQuestions.debatable}</li>
                                  </ul>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <h2 style={ { fontSize: '1.2em', fontWeight: 'bold', borderBottom: '2px solid #000', paddingBottom: '5px', marginBottom: '15px' } }>2. 국가 교육과정 연계</h2>
                          <div style={ { border: '1px solid #000', padding: '15px', marginBottom: '30px' } }><ul style={ { paddingLeft: '20px', margin: 0 } }>{generatedPlan.koreanCurriculum.map((s,i) => <li key={i}>{s}</li>)}</ul></div>
                          <h2 style={ { fontSize: '1.2em', fontWeight: 'bold', borderBottom: '2px solid #000', paddingBottom: '5px', marginBottom: '15px' } }>3. 실행 (Action)</h2>
                          <div style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#f8fafc' } }><ol style={ { paddingLeft: '20px', margin: 0 } }>{generatedPlan.learningProcess.map((step, i) => <li key={i} style={ { marginBottom: '5px' } }>{step}</li>)}</ol></div>
                        </div>
                      </div>
                    </div>
                  )}

                  {resultTab === 'worksheet' && (
                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                      <div className="flex justify-end">
                        <button onClick={() => exportToWord("worksheet-content", "탐구학습지.doc", "학습지")} className="bg-teal-600 text-white font-bold py-2.5 px-5 rounded-xl text-sm"><i className="fas fa-download mr-2"></i>다운로드</button>
                      </div>
                      <div className="bg-white p-10 md:p-14 border rounded-3xl shadow-sm overflow-x-auto">
                        <div id="worksheet-content" className="font-sans min-w-[700px] text-[11pt] text-black">
                          <h1 style={ { textAlign: 'center', fontSize: '2em', fontWeight: '900', margin: '0' } }>탐구 활동지</h1>
                          <h2 style={ { textAlign: 'center', fontSize: '1.2em', marginTop: '10px', marginBottom: '35px' } }>{generatedPlan.unitTitle}</h2>
                          
                          {/* 제시문 영역 동적 렌더링 */}
                          {generatedPlan.worksheet.excerpt && (
                            <div className="excerpt-box" style={ { backgroundColor: '#f8fafc', borderLeft: '4px solid #0d9488', padding: '20px', marginBottom: '25px', borderRadius: '8px', whiteSpace: 'pre-wrap', border: '1px solid #cbd5e1' } }>
                              {generatedPlan.worksheet.excerpt}
                            </div>
                          )}

                          {generatedPlan.worksheet.activities.map((act, idx) => (
                            <div key={idx} style={ { marginBottom: '30px' } }>
                              <h3 style={ { fontSize: '1.2em', fontWeight: 'bold', backgroundColor: '#f1f5f9', padding: '10px 15px', borderLeft: '5px solid #0d9488', margin: '0 0 15px 0' } }>활동 {idx + 1}. {act.title}</h3>
                              <p style={ { margin: '0 0 15px 0' } }>{act.desc}</p>
                              <div style={ { border: '1px solid #94a3b8', height: act.space, width: '100%', backgroundColor: '#fff', borderRadius: '4px' } }></div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {resultTab === 'assessment' && (
                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                      <div className="flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm">
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                          <button onClick={() => setAssessmentMode('student')} className={`px-4 py-2 text-sm font-bold rounded-lg ${assessmentMode === 'student' ? 'bg-orange-500 text-white' : 'text-slate-500'}`}>학생용</button>
                          <button onClick={() => setAssessmentMode('teacher')} className={`px-4 py-2 text-sm font-bold rounded-lg ${assessmentMode === 'teacher' ? 'bg-red-500 text-white' : 'text-slate-500'}`}>교사용(해설)</button>
                        </div>
                        <button onClick={() => exportToWord("assessment-content", "형성평가.doc", "형성평가")} className="bg-orange-500 text-white font-bold py-2 px-4 rounded-xl text-sm"><i className="fas fa-download mr-1"></i> 다운로드</button>
                      </div>
                      <div className="bg-white p-10 md:p-14 border rounded-3xl shadow-sm overflow-x-auto">
                        <div id="assessment-content" className="font-sans min-w-[700px] text-[11pt] text-black">
                          <h1 style={ { textAlign: 'center', fontSize: '2em', fontWeight: '900', margin: '0 0 40px 0' } }>형성평가</h1>
                          
                          {generatedPlan.assessment.excerpt && (
                            <div className="excerpt-box" style={ { backgroundColor: '#fff7ed', borderLeft: '4px solid #f97316', padding: '20px', marginBottom: '30px', borderRadius: '8px', whiteSpace: 'pre-wrap', border: '1px solid #fdba74' } }>
                              {generatedPlan.assessment.excerpt}
                            </div>
                          )}

                          {generatedPlan.assessment.questions.map((q, idx) => (
                            <div key={idx} style={ { marginBottom: '40px' } }>
                              <p style={ { fontWeight: 'bold', marginBottom: '15px', fontSize: '1.15em' } }>{idx + 1}. {q.q}</p>
                              <div style={ { border: assessmentMode === 'student' ? '1px solid #94a3b8' : '2px dashed #ef4444', height: assessmentMode === 'student' ? '150px' : 'auto', padding: assessmentMode === 'teacher' ? '20px' : '0', backgroundColor: assessmentMode === 'teacher' ? '#fef2f2' : '#fff', borderRadius: '4px' } }>
                                {assessmentMode === 'teacher' && <><p style={ { fontWeight: 'bold', margin: '0 0 8px 0', color: '#b91c1c' } }>[정답 및 해설]</p><p style={ { margin: 0, color: '#b91c1c', whiteSpace: 'pre-wrap' } }>{q.a}</p></>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {resultTab === 'essay' && (
                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                      <div className="flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm">
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                          <button onClick={() => setEssayMode('student')} className={`px-4 py-2 text-sm font-bold rounded-lg ${essayMode === 'student' ? 'bg-rose-500 text-white' : 'text-slate-500'}`}>평가지</button>
                          <button onClick={() => setEssayMode('rubric')} className={`px-4 py-2 text-sm font-bold rounded-lg ${essayMode === 'rubric' ? 'bg-rose-500 text-white' : 'text-slate-500'}`}>루브릭</button>
                        </div>
                        <button onClick={() => exportToWord("essay-content", "서논술형.doc", "서논술형")} className="bg-rose-500 text-white font-bold py-2 px-4 rounded-xl text-sm"><i className="fas fa-download mr-1"></i> 다운로드</button>
                      </div>
                      <div className="bg-white p-10 md:p-14 border rounded-3xl shadow-sm overflow-x-auto">
                        <div id="essay-content" className="font-sans min-w-[700px] text-[11pt] text-black">
                          {essayMode === 'student' ? (
                            <>
                              <h1 style={ { textAlign: 'center', fontSize: '2em', fontWeight: '900', margin: '0 0 35px 0' } }>서술·논술형 평가</h1>
                              
                              {generatedPlan.essay.excerpt && (
                                <div className="excerpt-box" style={ { backgroundColor: '#fff1f2', borderLeft: '4px solid #e11d48', padding: '20px', marginBottom: '25px', borderRadius: '8px', whiteSpace: 'pre-wrap', border: '1px solid #fecdd3' } }>
                                  {generatedPlan.essay.excerpt}
                                </div>
                              )}

                              <div style={ { marginBottom: '25px', padding: '20px', border: '1px solid #cbd5e1', backgroundColor: '#f8fafc', borderRadius: '8px' } }>
                                <h3 style={ { margin: '0 0 10px 0', fontSize: '1.2em' } }>[문항]</h3>
                                <p style={ { margin: '0', fontSize: '1.1em', whiteSpace: 'pre-wrap' } }>{generatedPlan.essay.prompt}</p>
                              </div>
                              <div style={ { marginBottom: '35px', padding: '20px', border: '2px dashed #94a3b8', borderRadius: '8px' } }>
                                <h3 style={ { margin: '0 0 12px 0', fontSize: '1.1em', color: '#334155' } }>※ 작성 조건</h3>
                                <ul style={ { margin: 0, paddingLeft: '20px', color: '#475569' } }>{generatedPlan.essay.conditions.map((cond, i) => <li key={i} style={ { marginBottom: '6px' } }>{cond}</li>)}</ul>
                              </div>
                              <div style={ { border: '1px solid #94a3b8', height: '400px', width: '100%', borderRadius: '4px' } }></div>
                            </>
                          ) : (
                            <>
                              <h1 style={ { textAlign: 'center', fontSize: '1.8em', fontWeight: '900', margin: '0 0 40px 0' } }>서술·논술형 채점 기준표(루브릭)</h1>
                              <table style={ { width: '100%', borderCollapse: 'collapse', border: '1px solid #000' } }>
                                <thead>
                                  <tr style={ { backgroundColor: '#f1f5f9' } }>
                                    <th style={ { border: '1px solid #000', padding: '12px', width: '20%' } }>평가 요소</th><th style={ { border: '1px solid #000', padding: '12px', width: '10%' } }>수준</th><th style={ { border: '1px solid #000', padding: '12px', width: '70%' } }>성취 기준 설명</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {generatedPlan.essay.rubric.map((item, idx) => (
                                    <React.Fragment key={idx}>
                                      {item.levels.map((level, lIdx) => (
                                        <tr key={`${idx}-${lIdx}`}>
                                          {lIdx === 0 && <td rowSpan={item.levels.length} style={ { border: '1px solid #000', padding: '15px', fontWeight: 'bold', textAlign: 'center', backgroundColor: '#f8fafc', whiteSpace: 'pre-wrap' } }>{item.criterion}</td>}
                                          <td style={ { border: '1px solid #000', padding: '12px', textAlign: 'center', fontWeight: 'bold', color: '#e11d48' } }>{level.score}</td>
                                          <td style={ { border: '1px solid #000', padding: '12px' } }>{level.desc}</td>
                                        </tr>
                                      ))}
                                    </React.Fragment>
                                  ))}
                                </tbody>
                              </table>
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {resultTab === 'flowchart' && (
                    <div className="space-y-4 animate-in slide-in-from-bottom-4">
                      <div className="flex justify-end">
                        <button onClick={() => exportToWord("flowchart-content", "수업흐름도.doc", "수업 흐름도")} className="bg-cyan-600 text-white font-bold py-2.5 px-5 rounded-xl text-sm"><i className="fas fa-download mr-2"></i>다운로드</button>
                      </div>
                      <div className="bg-white p-10 md:p-14 border rounded-3xl shadow-sm overflow-x-auto">
                        <div id="flowchart-content" className="font-sans min-w-[700px] text-[11pt] text-black">
                          <h1 style={ { textAlign: 'center', fontSize: '1.8em', fontWeight: '900', margin: '0 0 30px 0', color: '#0891b2' } }>1-Page 수업 흐름도</h1>
                          <table style={ { width: '100%', borderCollapse: 'collapse', border: '2px solid #000' } }>
                            <tbody>
                              <tr><td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', width: '20%', fontWeight: 'bold', textAlign: 'center' } }>교수학습 전략</td><td style={ { border: '1px solid #000', padding: '15px', fontWeight: 'bold' } }>{generatedPlan.flowchart.strategies}</td></tr>
                              <tr><td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', fontWeight: 'bold', textAlign: 'center' } }>수업 강조점</td><td style={ { border: '1px solid #000', padding: '15px', fontStyle: 'italic' } }>"{generatedPlan.flowchart.emphasis}"</td></tr>
                              <tr>
                                <td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', fontWeight: 'bold', textAlign: 'center' } }>수업 흐름</td>
                                <td style={ { border: '1px solid #000', padding: '20px' } }>
                                  <div style={ { display: 'flex', flexDirection: 'column', gap: '10px' } }>
                                    {generatedPlan.flowchart.flow.map((step, idx) => (
                                      <div key={idx} style={ { display: 'flex' } }><strong style={ { color: '#0891b2', marginRight: '8px' } }>{idx+1}.</strong> <span>{step}</span></div>
                                    ))}
                                  </div>
                                </td>
                              </tr>
                              <tr><td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', fontWeight: 'bold', textAlign: 'center' } }>평가 방안</td><td style={ { border: '1px solid #000', padding: '15px' } }>{generatedPlan.flowchart.assessmentPlan}</td></tr>
                              <tr>
                                <td style={ { border: '1px solid #000', padding: '15px', backgroundColor: '#ecfeff', fontWeight: 'bold', textAlign: 'center' } }>기대 효과</td>
                                <td style={ { border: '1px solid #000', padding: '15px' } }>
                                  <ul style={ { margin: 0, paddingLeft: '20px' } }>{generatedPlan.flowchart.expectedEffects.map((effect, idx) => <li key={idx} style={ { marginBottom: '5px' } }>{effect}</li>)}</ul>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('planner');

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
          <aside className="w-72 bg-slate-900 flex flex-col z-20 shadow-xl">
            <div className="p-6 flex items-center space-x-3 border-b border-slate-800">
              <div className="bg-blue-600 p-2 rounded-xl text-white text-xl"><i className="fas fa-book-open"></i></div>
              <h1 className="text-[1.1rem] font-bold text-white tracking-tight leading-tight">IB & 2022<br/>국어 수업 설계</h1>
            </div>
            <nav className="p-4 space-y-2 flex-1">
              <NavButton active={activeTab === 'planner'} onClick={() => setActiveTab('planner')} icon={<i className="fas fa-file-alt text-lg"></i>} label="교수학습과정안 설계" />
              <NavButton active={activeTab === 'record'} onClick={() => setActiveTab('record')} icon={<i className="fas fa-star text-lg"></i>} label="교과 세특 자동 생성" />
              <NavButton active={activeTab === 'methods'} onClick={() => setActiveTab('methods')} icon={<i className="fas fa-lightbulb text-lg"></i>} label="국어과 맞춤 수업 방법" />
            </nav>
          </aside>

          <main className="flex-1 flex flex-col h-screen relative overflow-hidden bg-slate-50">
            <header className="h-16 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center px-8 justify-between shadow-sm z-10 absolute top-0 w-full">
              <h2 className="text-lg font-bold text-slate-800">
                {activeTab === 'planner' && 'AI 맞춤형 수업 자료 설계'}
                {activeTab === 'record' && 'AI 교과 세특 생성'}
                {activeTab === 'methods' && '국어과 맞춤형 수업 방법'}
              </h2>
            </header>
            <div className="flex-1 overflow-y-auto p-8 pt-24 pb-20">
              <div className="max-w-5xl mx-auto">
                {activeTab === 'planner' && <PlannerView />}
                {activeTab === 'record' && <RecordView />}
                {activeTab === 'methods' && <MethodsView />}
              </div>
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    /* {% endraw %} */
  </script>
</body>
</html>
